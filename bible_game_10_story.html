<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>兒童聖經故事遊戲</title>
  <style>
    :root {
      --bg1: #fff7e8;
      --bg2: #eef7ff;
      --card: #ffffff;
      --text: #2f2a25;
      --primary: #5b8def;
      --primary-dark: #3f6fd1;
      --accent: #ffb84d;
      --accent-2: #ff7eb6;
      --success: #27ae60;
      --danger: #eb5757;
      --shadow: 0 12px 30px rgba(0,0,0,.10);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Arial", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 100%);
      min-height: 100vh;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px 48px;
    }

    .hero {
      background: linear-gradient(135deg, #6fa8ff, #8fd3ff 55%, #ffe28a);
      color: white;
      border-radius: 28px;
      padding: 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .hero::before,
    .hero::after {
      content: "⭐";
      position: absolute;
      font-size: 40px;
      opacity: .25;
      animation: floatStar 4s ease-in-out infinite;
    }

    .hero::before { top: 16px; right: 20px; }
    .hero::after { bottom: 18px; left: 18px; animation-delay: 1.2s; }

    @keyframes floatStar {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(10deg); }
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
      max-width: 760px;
      line-height: 1.7;
    }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      margin-top: 20px;
    }

    .sidebar,
    .main-card {
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .sidebar {
      padding: 18px;
      position: sticky;
      top: 16px;
      height: fit-content;
    }

    .main-card {
      padding: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 14px;
      font-size: 20px;
    }

    .progress-wrap {
      margin-bottom: 18px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: #e7eefc;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ffd166, #ff9f43, #ff7eb6);
      border-radius: 999px;
      transition: width .4s ease;
    }

    .story-list {
      display: grid;
      gap: 10px;
    }

    .story-btn {
      width: 100%;
      text-align: left;
      border: none;
      border-radius: 18px;
      padding: 12px 14px;
      background: #f7faff;
      cursor: pointer;
      transition: transform .15s ease, background .2s ease, box-shadow .2s ease;
      font-size: 15px;
      color: var(--text);
    }

    .story-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(91,141,239,.16);
    }

    .story-btn.active {
      background: linear-gradient(135deg, #e6f0ff, #fff4d2);
      outline: 2px solid #b7cdfb;
    }

    .story-btn.done {
      background: linear-gradient(135deg, #e7fff0, #faffeb);
    }

    .story-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .story-name {
      font-weight: 700;
      line-height: 1.35;
    }

    .story-icon {
      font-size: 22px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      background: white;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #f6f8ff;
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      border-radius: 22px;
      overflow: hidden;
      background: #dbe8ff;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.04);
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .story-content {
      margin-top: 18px;
      display: grid;
      gap: 18px;
    }

    .content-card {
      background: #fff;
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
    }

    .content-card h3 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .summary {
      font-size: 18px;
      line-height: 1.85;
    }

    .lesson-list {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .lesson-item {
      background: #fff9ea;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 16px;
    }

    .quiz-box {
      display: grid;
      gap: 14px;
    }

    .question-card {
      border: 2px solid #eef2ff;
      border-radius: 18px;
      padding: 14px;
      background: #fcfdff;
    }

    .question-title {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    .options {
      display: grid;
      gap: 10px;
    }

    .option-btn {
      border: none;
      background: #f5f8ff;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 16px;
      text-align: left;
      cursor: pointer;
      transition: .2s ease;
    }

    .option-btn:hover {
      background: #eaf1ff;
      transform: translateY(-1px);
    }

    .option-btn.correct {
      background: #e8fff0;
      outline: 2px solid #7fd9a4;
    }

    .option-btn.wrong {
      background: #fff1f1;
      outline: 2px solid #ffb3b3;
    }

    .feedback {
      margin-top: 10px;
      font-size: 15px;
      font-weight: 700;
      min-height: 24px;
    }

    .feedback.correct { color: var(--success); }
    .feedback.wrong { color: var(--danger); }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: .2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
    }

    .btn-secondary {
      background: #f0f5ff;
      color: var(--primary-dark);
    }

    .btn:hover { transform: translateY(-1px); }

    .reward {
      margin-top: 18px;
      border-radius: 24px;
      padding: 22px;
      text-align: center;
      background: linear-gradient(135deg, #fff3bf, #ffe6f1, #e8f4ff);
      display: none;
      position: relative;
      overflow: hidden;
    }

    .reward.show { display: block; }

    .reward h3 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    .reward p {
      margin: 0;
      font-size: 18px;
      line-height: 1.7;
    }

    .star-burst {
      position: relative;
      height: 84px;
      margin-bottom: 12px;
    }

    .star {
      position: absolute;
      font-size: 34px;
      animation: pop 1.6s ease-in-out infinite;
      opacity: 0;
    }

    .star:nth-child(1) { left: 16%; top: 28px; animation-delay: 0s; }
    .star:nth-child(2) { left: 30%; top: 0; animation-delay: .2s; }
    .star:nth-child(3) { left: 46%; top: 26px; animation-delay: .4s; }
    .star:nth-child(4) { left: 60%; top: 4px; animation-delay: .6s; }
    .star:nth-child(5) { left: 76%; top: 24px; animation-delay: .8s; }

    @keyframes pop {
      0% { transform: translateY(20px) scale(.3) rotate(0deg); opacity: 0; }
      30% { opacity: 1; }
      60% { transform: translateY(-8px) scale(1.1) rotate(10deg); opacity: 1; }
      100% { transform: translateY(-18px) scale(.8) rotate(-10deg); opacity: 0; }
    }

    .score-box {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      line-height: 1.7;
      color: #6a6763;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .hero,
      .sidebar,
      .main-card,
      .content-card,
      .reward {
        border-radius: 20px;
      }

      .summary {
        font-size: 17px;
      }

      .question-title,
      .option-btn,
      .lesson-item,
      .reward p {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <h1>📖✨ 兒童聖經故事遊戲</h1>
      <p>
        為我 4 歲的兒子而設計的互動學習遊戲，希望他一邊學中文，一邊從聖經故事中學到一些美好、善良、值得一生記住的價值。正如《箴言》所說：「教養孩童，使他走當行的道，就是到老他也不偏離。」
      </p>
    </section>

    <div class="layout">
      <aside class="sidebar">
        <h2 class="section-title">🌈 故事進度</h2>

        <div class="progress-wrap">
          <div class="progress-label">
            <span id="progressText">已完成 0 / 10</span>
            <span id="starCount">⭐ 0</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="story-list" id="storyList"></div>

              </aside>

      <main class="main-card">
        <div class="topbar">
          <div class="pill" id="storyBadge">📘 故事 1 / 10</div>
          <div class="score-box" id="scoreBox">答對：0 / 3</div>
        </div>

        <div class="video-wrap">
          <iframe id="videoFrame" src="" title="Bible Story Video" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>

        <div class="story-content">
          <section class="content-card">
            <h3 id="storyTitle">故事標題</h3>
            <div class="summary" id="storySummary"></div>
          </section>

          <section class="content-card">
            <h3>💡 今日學習</h3>
            <div class="lesson-list" id="lessonList"></div>
          </section>

          <section class="content-card">
            <h3>🧠 問答時間</h3>
            <div class="quiz-box" id="quizBox"></div>

            <div class="actions">
              <button class="btn btn-primary" id="checkBtn">檢查答案</button>
              <button class="btn btn-secondary" id="resetBtn">重新作答</button>
              <button class="btn btn-secondary" id="nextBtn">下一個故事</button>
            </div>

            <div class="reward" id="rewardBox">
              <div class="star-burst">
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
                <span class="star">⭐</span>
              </div>
              <h3>做得好！</h3>
              <p id="rewardText">你完成了這個故事！</p>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script>
    const stories = [
      {
        id: 1,
        icon: "🌎",
        title: "神創造世界",
        youtubeId: "VIDEO_ID_1",
        summary: "起初，神創造天地、光、海洋、植物、太陽、月亮、星星、動物，最後創造了人。神看一切都很好。這告訴我們，世界和我們每一個人都是神用愛創造的。",
        lessons: [
          "神創造世界，很美好。",
          "神創造我，所以我很寶貴。",
          "我們要感謝神所做的一切。"
        ],
        reward: "神創造你，你是很特別、很寶貴的孩子。",
        questions: [
          { q: "是誰創造世界？", options: ["神", "老師", "小朋友"], answer: 0 },
          { q: "神看祂所創造的一切，覺得怎樣？", options: ["很好", "很可怕", "不知道"], answer: 0 },
          { q: "我們應該怎樣回應神的創造？", options: ["感謝神", "破壞東西", "不理會"], answer: 0 }
        ]
      },
      {
        id: 2,
        icon: "🚢",
        title: "挪亞方舟",
        youtubeId: "VIDEO_ID_2",
        summary: "挪亞是一個聽神話的人。神叫他建造方舟，並帶動物進去。後來大雨來了，但方舟裡的人和動物都很平安。最後，神用彩虹作記號，表示祂的應許。",
        lessons: [
          "要像挪亞一樣聽神的話。",
          "神會保護信靠祂的人。",
          "彩虹提醒我們神的愛與應許。"
        ],
        reward: "你學會了像挪亞一樣聽神的話。",
        questions: [
          { q: "挪亞建造的是什麼？", options: ["方舟", "城堡", "學校"], answer: 0 },
          { q: "挪亞帶了什麼進方舟？", options: ["動物", "玩具", "汽車"], answer: 0 },
          { q: "神用什麼作為應許的記號？", options: ["彩虹", "月亮", "風箏"], answer: 0 }

      },
      {
        id: 3,
        icon: "🐋",
        title: "約拿與大魚",
        youtubeId: "VIDEO_ID_3",
        summary: "神叫約拿去傳話，但約拿不想去，就逃跑了。後來他被大魚吞進肚子裡。約拿向神禱告，神幫助他。最後約拿願意順服神。",
        lessons: [
          "神要我們順服祂。",
          "做錯了可以向神禱告。",
          "神願意再給我們機會。"
        ],
        reward: "神願意幫助每一個願意回轉的孩子。",
        questions: [
          { q: "約拿後來被什麼吞下去？", options: ["大魚", "獅子", "小鳥"], answer: 0 },
          { q: "約拿在魚肚裡做了什麼？", options: ["禱告", "睡覺", "唱歌"], answer: 0 },
          { q: "這個故事教我們什麼？", options: ["要順服神", "要躲起來", "要生氣"], answer: 0 }
        ]
      },
      {
        id: 4,
        icon: "🪨",
        title: "大衛與歌利亞",
        youtubeId: "VIDEO_ID_4",
        summary: "歌利亞是很高大的戰士，大家都很害怕。但小小的大衛相信神會幫助他。最後，大衛用石頭打敗了歌利亞。",
        lessons: [
          "神比困難更大。",
          "勇敢不是靠自己，是靠神。",
          "小朋友也可以信靠神。"
        ],
        reward: "當你害怕時，也可以像大衛一樣信靠神。",
        questions: [
          { q: "誰打敗了歌利亞？", options: ["大衛", "掃羅", "約拿"], answer: 0 },
          { q: "大衛靠什麼得勝？", options: ["信靠神", "大力氣", "很多士兵"], answer: 0 },
          { q: "大衛用什麼打歌利亞？", options: ["石頭", "雨傘", "木船"], answer: 0 }
        ]
      },
      {
        id: 5,
        icon: "🦁",
        title: "但以理在獅子坑",
        youtubeId: "VIDEO_ID_5",
        summary: "但以理很愛神，每天都向神禱告。雖然有人陷害他，把他丟進獅子坑，但神保護了他，獅子沒有傷害他。",
        lessons: [

          "神會陪伴和保護我們。",
          "遇到困難也要相信神。"
        ],
        reward: "神像保護但以理一樣，也會看顧你。",
        questions: [
          { q: "但以理常常做什麼？", options: ["禱告", "逃跑", "躲起來"], answer: 0 },
          { q: "但以理被丟到哪裡？", options: ["獅子坑", "海裡", "山上"], answer: 0 },
          { q: "誰保護了但以理？", options: ["神", "國王", "朋友"], answer: 0 }

      },
      {
        id: 6,
        icon: "👶",
        title: "耶穌出生了",
        youtubeId: "VIDEO_ID_6",
        summary: "耶穌出生在馬槽裡。天使把好消息告訴牧羊人。博士也來敬拜耶穌。耶穌來到世界，是神送給我們最美好的禮物。",
        lessons: [
          "耶穌愛我們。",
          "耶穌是神給世界的禮物。",

          { q: "耶穌來到世界代表什麼？", options: ["神愛我們", "下雨了", "去旅行"], answer: 0 }
        ]
      },
      {
        id: 7,
        icon: "🍞",
        title: "五餅二魚",
        youtubeId: "VIDEO_ID_7",
        summary: "有很多人跟著耶穌，大家都肚子餓了。小男孩把五個餅和兩條魚交給耶穌。耶穌祝謝後，食物竟然夠大家吃，還有剩下。",

          { q: "這個故事提醒我們什麼？", options: ["要分享", "要藏起來", "要搶東西"], answer: 0 }

      {
        id: 8,
        icon: "❤️",

        questions: [

          { q: "這個故事教我們什麼？", options: ["要幫助別人", "要走開", "要取笑人"], answer: 0 },
          { q: "看到別人有需要，我們可以怎樣做？", options: ["關心和幫忙", "不理他", "生氣"], answer: 0 }
        ]
      },
      {
        id: 9,
        icon: "🐑",
        title: "迷失的羊",
        youtubeId: "VIDEO_ID_9",
        summary: "牧羊人有一百隻羊，其中一隻迷路了。牧羊人就去找那一隻，找到後很開心。耶穌說，祂很愛每一個人，不會忘記我們。",
        lessons: [
          "耶穌愛每一個人。",
          "迷路時，耶穌會尋找我們。",
          "每一個孩子對神都很重要。"
        ],
        reward: "你對耶穌來說非常重要。",
        questions: [
          { q: "牧羊人有多少隻羊？", options: ["100 隻", "2 隻", "10 隻"], answer: 0 },
          { q: "少了一隻羊後，牧羊人做什麼？", options: ["去找牠", "不理牠", "回家睡覺"], answer: 0 },
          { q: "這個故事代表耶穌怎樣看我們？", options: ["很珍惜我們", "忘記我們", "不理我們"], answer: 0 }
        ]
      },
      {
        id: 10,
        icon: "🌅",
        title: "耶穌復活了",
        youtubeId: "VIDEO_ID_10",
        summary: "耶穌為了愛我們而死，第三天祂復活了。空墳墓帶來好消息：耶穌活著！所以我們有盼望，也不用害怕。",
        lessons: [
          "耶穌真的活著。",
          "耶穌愛我們到底。",
          "因為耶穌，我們有盼望。"
        ],
        reward: "耶穌復活了，所以我們心裡有喜樂和盼望。",
        questions: [
          { q: "耶穌在第幾天復活？", options: ["第三天", "第一天", "第十天"], answer: 0 },
          { q: "空墳墓代表什麼？", options: ["耶穌復活了", "沒有人知道", "故事結束了"], answer: 0 },
          { q: "因為耶穌復活，我們可以怎樣？", options: ["有盼望", "很害怕", "不開心"], answer: 0 }
        ]
      }
    ];

    let currentStoryIndex = 0;
    let selectedAnswers = {};
    let completedStories = JSON.parse(localStorage.getItem("bibleGameCompleted") || "[]");

    const storyList = document.getElementById("storyList");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const storyBadge = document.getElementById("storyBadge");
    const scoreBox = document.getElementById("scoreBox");
    const storyTitle = document.getElementById("storyTitle");
    const storySummary = document.getElementById("storySummary");
    const lessonList = document.getElementById("lessonList");
    const quizBox = document.getElementById("quizBox");
    const rewardBox = document.getElementById("rewardBox");
    const rewardText = document.getElementById("rewardText");
    const videoFrame = document.getElementById("videoFrame");
    const starCount = document.getElementById("starCount");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const nextBtn = document.getElementById("nextBtn");

    function saveProgress() {
      localStorage.setItem("bibleGameCompleted", JSON.stringify(completedStories));
    }

    function isStoryCompleted(storyId) {
      return completedStories.includes(storyId);
    }

    function updateProgress() {
      const done = completedStories.length;
      progressText.textContent = `已完成 ${done} / ${stories.length}`;
      progressFill.style.width = `${(done / stories.length) * 100}%`;
      starCount.textContent = `⭐ ${done}`;
    }

    function renderStoryList() {
      storyList.innerHTML = "";

      stories.forEach((story, index) => {
        const btn = document.createElement("button");
        btn.className = "story-btn";
        if (index === currentStoryIndex) btn.classList.add("active");
        if (isStoryCompleted(story.id)) btn.classList.add("done");

        btn.innerHTML = `
          <div class="story-meta">
            <div>
              <div class="story-name">${story.id}. ${story.title}</div>
              <div style="font-size:12px;color:#667; margin-top:4px;">${isStoryCompleted(story.id) ? "已完成 ✅" : "未完成"}</div>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
              <span class="tag">${story.id}</span>
              <span class="story-icon">${story.icon}</span>
            </div>
          </div>
        `;

        btn.addEventListener("click", () => {
          currentStoryIndex = index;
          selectedAnswers = {};
          rewardBox.classList.remove("show");
          render();
        });

        storyList.appendChild(btn);
      });
    }

    function renderLessons(lessons) {
      lessonList.innerHTML = lessons.map(item => `<div class="lesson-item">${item}</div>`).join("");
    }

    function renderQuiz(questions) {
      quizBox.innerHTML = "";

      questions.forEach((item, qIndex) => {
        const questionCard = document.createElement("div");
        questionCard.className = "question-card";

        const optionsHTML = item.options.map((option, oIndex) => {
          const isSelected = selectedAnswers[qIndex] === oIndex;
          return `
            <button class="option-btn ${isSelected ? "selected" : ""}" data-q="${qIndex}" data-o="${oIndex}">
              ${String.fromCharCode(65 + oIndex)}. ${option}
            </button>
          `;
        }).join("");

        questionCard.innerHTML = `
          <div class="question-title">${qIndex + 1}. ${item.q}</div>
          <div class="options">${optionsHTML}</div>
          <div class="feedback" id="feedback-${qIndex}"></div>
        `;

        quizBox.appendChild(questionCard);
      });

      document.querySelectorAll(".option-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const q = Number(btn.dataset.q);
          const o = Number(btn.dataset.o);
          selectedAnswers[q] = o;
          renderQuiz(questions);
          scoreBox.textContent = `答對：0 / ${questions.length}`;
        });
      });
    }

    function render() {
      const story = stories[currentStoryIndex];
      storyBadge.textContent = `📘 故事 ${story.id} / ${stories.length}`;
      storyTitle.textContent = `${story.icon} ${story.title}`;
      storySummary.textContent = story.summary;
      rewardText.textContent = story.reward;

      const yt = story.youtubeId && story.youtubeId.startsWith("http")
        ? story.youtubeId
        : `https://www.youtube.com/embed/${story.youtubeId}`;
      videoFrame.src = yt;

      renderLessons(story.lessons);
      renderQuiz(story.questions);
      renderStoryList();
      updateProgress();
      scoreBox.textContent = `答對：0 / ${story.questions.length}`;
    }

    function checkAnswers() {
      const story = stories[currentStoryIndex];
      let correctCount = 0;

      story.questions.forEach((item, qIndex) => {
        const feedback = document.getElementById(`feedback-${qIndex}`);
        const optionButtons = quizBox.querySelectorAll(`.option-btn[data-q="${qIndex}"]`);

        optionButtons.forEach(btn => {
          const optIndex = Number(btn.dataset.o);
          btn.classList.remove("correct", "wrong");
          if (optIndex === item.answer) {
            btn.classList.add("correct");
          }
          if (selectedAnswers[qIndex] === optIndex && optIndex !== item.answer) {
            btn.classList.add("wrong");
          }
        });

        if (selectedAnswers[qIndex] === item.answer) {
          correctCount++;
          feedback.textContent = "答對了！做得好！🎉";
          feedback.className = "feedback correct";
        } else if (selectedAnswers[qIndex] === undefined) {
          feedback.textContent = "請先選一個答案喔。";
          feedback.className = "feedback wrong";
        } else {
          feedback.textContent = `再試試看，正確答案是：${String.fromCharCode(65 + item.answer)}. ${item.options[item.answer]}`;
          feedback.className = "feedback wrong";
        }
      });

      scoreBox.textContent = `答對：${correctCount} / ${story.questions.length}`;

      if (correctCount === story.questions.length) {
        rewardBox.classList.add("show");
        if (!completedStories.includes(story.id)) {
          completedStories.push(story.id);
          saveProgress();
        }
        renderStoryList();
        updateProgress();
      } else {
        rewardBox.classList.remove("show");
      }
    }

    function resetQuiz() {
      selectedAnswers = {};
      rewardBox.classList.remove("show");
      render();
    }

    function nextStory() {
      currentStoryIndex = (currentStoryIndex + 1) % stories.length;
      selectedAnswers = {};
      rewardBox.classList.remove("show");
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    checkBtn.addEventListener("click", checkAnswers);
    resetBtn.addEventListener("click", resetQuiz);
    nextBtn.addEventListener("click", nextStory);

    render();
  </script>
</body>
</html>
