<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>部件組字機 Hanzi Blender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FFF6E9;
    --ink:#2B2B33;
    --mango:#FFB100;
    --melon:#FF5D73;
    --jade:#2EC4B6;
    --sky:#3E92CC;
    --grape:#9B5DE5;
    --tile:#FFFFFF;
    --shadow:0 6px 0 rgba(43,43,51,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Noto Sans TC',sans-serif; overflow:hidden;
    background-image:radial-gradient(rgba(255,177,0,.12) 2px, transparent 2px);
    background-size:34px 34px;
    user-select:none; -webkit-user-select:none;
  }
  #app{max-width:520px; margin:0 auto; height:100dvh; display:flex; flex-direction:column; padding:12px;}

  /* ---------- header ---------- */
  header{display:flex; align-items:center; justify-content:space-between; gap:8px; padding:4px 2px;}
  .brand{font-family:'Baloo 2',cursive; font-weight:800; font-size:1.05rem; color:var(--ink); display:flex; align-items:center; gap:6px;}
  .brand .zh{font-family:'Noto Sans TC'; font-weight:900; font-size:1.15rem;}
  .starbar{font-weight:900; font-size:1.05rem; background:#fff; border-radius:999px; padding:6px 14px; box-shadow:var(--shadow);}

  .btn{
    border:0; cursor:pointer; font-family:inherit; font-weight:900; color:var(--ink);
    background:#fff; border-radius:22px; box-shadow:var(--shadow);
    transition:transform .12s ease;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 2px 0 rgba(43,43,51,.18);}

  /* ---------- screens ---------- */
  .screen{flex:1; display:none; flex-direction:column; min-height:0;}
  .screen.on{display:flex;}

  /* level select */
  #menu{justify-content:center;}
  #menu h1{text-align:center; font-size:1.5rem; font-weight:900; margin:0;}
  #menu p.sub{text-align:center; margin:4px 0 16px; font-weight:700; color:#7a7466; font-size:.85rem;}
  #lvlist{display:flex; flex-direction:column; gap:12px;}
  .lvbtn{
    display:grid; grid-template-columns:52px 1fr auto; align-items:center; gap:14px;
    width:100%; padding:12px 16px; font-size:1.1rem; text-align:left;
  }
  .lvbtn .badge{
    width:52px; height:52px; border-radius:16px; display:flex; align-items:center; justify-content:center;
    font-size:1.6rem; color:#fff;
  }
  .lvbtn .meta{line-height:1.25; min-width:0;}
  .lvbtn .meta .num{display:block; font-size:.72rem; font-weight:800; color:#b0a892; letter-spacing:.06em;}
  .lvbtn .stars{
    font-size:1rem; letter-spacing:2px; white-space:nowrap; text-align:right;
  }
  .lvbtn .stars .off{opacity:.25; filter:grayscale(1);}
  .c1{background:var(--mango);} .c2{background:var(--jade);} .c3{background:var(--melon);} .c4{background:var(--sky);} .c5{background:var(--grape);}

  /* ---------- game ---------- */
  #game{gap:8px;}
  .target{
    display:flex; align-items:center; justify-content:center; gap:16px; padding:6px 0 0;
  }
  .target .bigchar{
    font-size:clamp(4.2rem,20vw,6rem); font-weight:900; line-height:1;
    text-shadow:4px 4px 0 rgba(255,177,0,.35);
  }
  .target .emoji{font-size:clamp(2.6rem,12vw,3.6rem); line-height:1;}
  .speak{
    width:56px; height:56px; border-radius:50%; font-size:1.5rem; flex:none;
    background:var(--mango); color:#fff;
  }

  /* blender jar */
  .jarwrap{flex:1; display:flex; align-items:center; justify-content:center; min-height:0;}
  .jar{
    position:relative; width:min(72vw,300px); aspect-ratio:5/4;
    background:linear-gradient(180deg,rgba(62,146,204,.12),rgba(62,146,204,.22));
    border:5px solid var(--ink); border-top-width:3px;
    border-radius:14px 14px 46px 46px;
    display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap; padding:12px;
  }
  .jar::before{ /* lid */
    content:""; position:absolute; top:-16px; left:18%; right:18%; height:14px;
    background:var(--ink); border-radius:8px;
  }
  .jar::after{ /* base */
    content:""; position:absolute; bottom:-22px; left:26%; right:26%; height:18px;
    background:var(--melon); border:4px solid var(--ink); border-radius:8px;
  }
  .jar.shake{animation:shake .5s ease 2;}
  @keyframes shake{
    0%,100%{transform:translateX(0) rotate(0)}
    20%{transform:translateX(-8px) rotate(-3deg)}
    40%{transform:translateX(8px) rotate(3deg)}
    60%{transform:translateX(-6px) rotate(-2deg)}
    80%{transform:translateX(6px) rotate(2deg)}
  }
  .jar.wrong{animation:wrongshake .4s ease;}
  @keyframes wrongshake{
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-10px)} 75%{transform:translateX(10px)}
  }
  .slot{
    width:74px; height:74px; border-radius:18px; border:3px dashed rgba(43,43,51,.35);
    display:flex; align-items:center; justify-content:center;
    font-size:2.4rem; font-weight:900; background:rgba(255,255,255,.5); cursor:pointer;
  }
  .slot.filled{border-style:solid; border-color:var(--ink); background:#fff; box-shadow:var(--shadow);}
  .result{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:4px;
  }
  .result.on{display:flex;}
  .result .rchar{
    font-size:clamp(4.5rem,26vw,7rem); font-weight:900; line-height:1; color:var(--ink);
    animation:pop .5s cubic-bezier(.2,1.6,.4,1);
  }
  .result .remoji{font-size:2.2rem; animation:pop .6s cubic-bezier(.2,1.6,.4,1);}
  @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}

  /* tile tray */
  .tray{
    display:flex; justify-content:center; gap:12px; flex-wrap:wrap; padding:6px 0 10px;
  }
  .tile{
    width:78px; height:78px; border-radius:20px; background:var(--tile);
    font-size:2.5rem; font-weight:900; font-family:'Noto Sans TC';
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow); border:0; cursor:pointer; color:var(--ink);
    transition:transform .12s ease, opacity .2s;
  }
  .tile:active{transform:scale(.92);}
  .tile.used{opacity:0; pointer-events:none; transform:scale(.3);}
  .tile.hint{animation:glow 1s ease infinite;}
  @keyframes glow{0%,100%{box-shadow:var(--shadow)}50%{box-shadow:0 0 0 6px rgba(255,177,0,.65)}}

  .hud{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:0 2px 4px;}
  .hud .home{padding:10px 16px; font-size:1rem;}
  .dots{display:flex; gap:6px;}
  .dot{width:12px; height:12px; border-radius:50%; background:#e4dccb;}
  .dot.done{background:var(--mango);}
  .dot.now{outline:3px solid var(--ink); outline-offset:2px; background:#fff;}

  /* celebration overlay */
  #cele{
    position:fixed; inset:0; display:none; align-items:center; justify-content:center; flex-direction:column; gap:14px;
    background:rgba(255,246,233,.94); z-index:50; text-align:center; padding:20px;
  }
  #cele.on{display:flex;}
  #cele .big{font-size:3.4rem; font-weight:900;}
  #cele .stars{font-size:2.6rem; letter-spacing:6px;}
  #cele .btn{padding:16px 30px; font-size:1.3rem; background:var(--jade); color:#fff;}

  .confetti{position:fixed; top:-30px; font-size:1.6rem; z-index:60; pointer-events:none; animation:fall linear forwards;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);}}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand"><span>🧃</span><span class="zh">部件組字機</span></div>
    <div class="starbar">⭐ <span id="totalStars">0</span></div>
  </header>

  <!-- ===== menu ===== -->
  <div class="screen on" id="menu">
    <h1>揀一關開始啦！</h1>
    <p class="sub">Tap a level to start</p>
    <div id="lvlist"></div>
  </div>

  <!-- ===== game ===== -->
  <div class="screen" id="game">
    <div class="hud">
      <button class="btn home" id="homeBtn">🏠</button>
      <div class="dots" id="dots"></div>
      <button class="btn speak" id="speakBtn" aria-label="再聽一次">🔊</button>
    </div>
    <div class="target">
      <div class="bigchar" id="bigChar">好</div>
      <div class="emoji" id="bigEmoji">👍</div>
    </div>
    <div class="jarwrap">
      <div class="jar" id="jar">
        <div id="slots" style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;"></div>
        <div class="result" id="result">
          <div class="rchar" id="rChar"></div>
          <div class="remoji" id="rEmoji"></div>
        </div>
      </div>
    </div>
    <div class="tray" id="tray"></div>
  </div>
</div>

<!-- ===== celebration ===== -->
<div id="cele">
  <div class="big">🎉 好叻呀！</div>
  <div class="stars" id="celeStars"></div>
  <button class="btn" id="celeBtn">繼續 ▶</button>
</div>

<script>
/* ================= data ================= */
const LEVELS = [
  { name:"左右拼字", en:"Side by side", color:"c1", icon:"🧩", items:[
    {char:"好", parts:["女","子"], emoji:"👍", word:"好朋友"},
    {char:"明", parts:["日","月"], emoji:"🌞", word:"明天"},
    {char:"林", parts:["木","木"], emoji:"🌳", word:"樹林"},
    {char:"朋", parts:["月","月"], emoji:"👬", word:"朋友"},
    {char:"休", parts:["人","木"], emoji:"😴", word:"休息"},
    {char:"鳴", parts:["口","鳥"], emoji:"🐦", word:"鳥鳴"},
  ]},
  { name:"上下拼字", en:"Top and bottom", color:"c2", icon:"🥞", items:[
    {char:"男", parts:["田","力"], emoji:"👦", word:"男仔"},
    {char:"尖", parts:["小","大"], emoji:"🔺", word:"尖尖哋"},
    {char:"早", parts:["日","十"], emoji:"🌅", word:"早晨"},
    {char:"呆", parts:["口","木"], emoji:"😐", word:"發呆"},
    {char:"岩", parts:["山","石"], emoji:"🪨", word:"岩石"},
    {char:"杏", parts:["木","口"], emoji:"🍑", word:"杏仁"},
  ]},
  { name:"疊疊樂", en:"Twins & triplets", color:"c3", icon:"🎂", items:[
    {char:"炎", parts:["火","火"], emoji:"🔥", word:"炎熱"},
    {char:"多", parts:["夕","夕"], emoji:"🎈", word:"好多"},
    {char:"森", parts:["木","木","木"], emoji:"🌲", word:"森林"},
    {char:"晶", parts:["日","日","日"], emoji:"✨", word:"水晶"},
    {char:"品", parts:["口","口","口"], emoji:"🛍️", word:"食品"},
    {char:"磊", parts:["石","石","石"], emoji:"🗿", word:"石頭磊磊"},
  ]},
  { name:"部首魔法", en:"Radical magic", color:"c4", icon:"🪄", items:[
    {char:"媽", parts:["女","馬"], emoji:"👩", word:"媽媽"},
    {char:"爸", parts:["父","巴"], emoji:"👨", word:"爸爸"},
    {char:"河", parts:["氵","可"], emoji:"🏞️", word:"河水"},
    {char:"吃", parts:["口","乞"], emoji:"🍚", word:"吃飯"},
    {char:"唱", parts:["口","昌"], emoji:"🎤", word:"唱歌"},
    {char:"抱", parts:["扌","包"], emoji:"🤗", word:"抱抱"},
  ]},
  { name:"砌詞語", en:"Build a word", color:"c5", icon:"🏗️", items:[
    {char:"大人", parts:["大","人"], emoji:"🧑", word:"大人", ordered:true},
    {char:"日出", parts:["日","出"], emoji:"🌅", word:"日出", ordered:true},
    {char:"火山", parts:["火","山"], emoji:"🌋", word:"火山", ordered:true},
    {char:"木馬", parts:["木","馬"], emoji:"🎠", word:"木馬", ordered:true},
    {char:"小山", parts:["小","山"], emoji:"⛰️", word:"小山", ordered:true},
    {char:"開心", parts:["開","心"], emoji:"😄", word:"開心", ordered:true},
  ]},
];
const DISTRACTORS = ["口","日","月","木","水","火","山","女","子","人","大","小","田","力","石","十","土","手","心","牛"];

/* ================= state ================= */
let lvIdx = 0, itemIdx = 0, fails = 0;
let order = [];               // shuffled item order for current level
let picked = [];              // {ch, tileEl}
let stars = LEVELS.map(()=>0);
let busy = false;

const $ = id => document.getElementById(id);

/* ================= speech ================= */
let voice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices();
  voice = vs.find(v=>/zh[-_]HK/i.test(v.lang))
       || vs.find(v=>/yue/i.test(v.lang))
       || vs.find(v=>/zh[-_]TW/i.test(v.lang))
       || vs.find(v=>/^zh/i.test(v.lang)) || null;
}
speechSynthesis.onvoiceschanged = pickVoice; pickVoice();
function say(text, rate=0.85){
  try{
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(voice) u.voice = voice;
    u.lang = voice ? voice.lang : "zh-HK";
    u.rate = rate; u.pitch = 1.1;
    speechSynthesis.speak(u);
  }catch(e){}
}

/* ================= menu ================= */
function renderMenu(){
  const box = $("lvlist"); box.innerHTML = "";
  LEVELS.forEach((lv,i)=>{
    const b = document.createElement("button");
    b.className = "btn lvbtn";
    const s = stars[i];
    const starHtml = "⭐".repeat(s) + `<span class="off">${"⭐".repeat(3-s)}</span>`;
    b.innerHTML = `<span class="badge ${lv.color}">${lv.icon}</span>
      <span class="meta"><span class="num">第 ${i+1} 關</span>${lv.name}</span>
      <span class="stars">${starHtml}</span>`;
    b.onclick = ()=> startLevel(i);
    box.appendChild(b);
  });
  $("totalStars").textContent = stars.reduce((a,b)=>a+b,0);
}

/* ================= game flow ================= */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

function startLevel(i){
  lvIdx = i; itemIdx = 0;
  order = shuffle(LEVELS[i].items);
  show("game");
  renderRound();
}
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  $(id).classList.add("on");
}

function currentItem(){ return order[itemIdx]; }

function renderRound(){
  busy = false; fails = 0; picked = [];
  const it = currentItem();
  $("bigChar").textContent = it.char;
  $("bigEmoji").textContent = it.emoji;
  $("result").classList.remove("on");

  // dots
  const dots = $("dots"); dots.innerHTML = "";
  order.forEach((_,k)=>{
    const d = document.createElement("div");
    d.className = "dot" + (k<itemIdx?" done":k===itemIdx?" now":"");
    dots.appendChild(d);
  });

  // slots
  const slots = $("slots"); slots.innerHTML = ""; slots.style.display = "flex";
  it.parts.forEach((_,k)=>{
    const s = document.createElement("div");
    s.className = "slot"; s.dataset.idx = k;
    s.onclick = ()=> unpick(k);
    slots.appendChild(s);
  });

  // tiles = parts + distractors
  const need = it.parts.slice();
  const pool = shuffle(DISTRACTORS.filter(d=>!need.includes(d)));
  const nDis = it.parts.length >= 3 ? 2 : 2;
  const tiles = shuffle(need.concat(pool.slice(0,nDis)));
  const tray = $("tray"); tray.innerHTML = "";
  tiles.forEach(ch=>{
    const t = document.createElement("button");
    t.className = "tile"; t.textContent = ch;
    t.onclick = ()=> pick(ch, t);
    tray.appendChild(t);
  });

  setTimeout(()=> say(`砌出，${it.word}，嘅${it.char.length>1?"詞語":"字"}，${it.char}`), 350);
}

function pick(ch, tileEl){
  if(busy) return;
  const it = currentItem();
  if(picked.length >= it.parts.length) return;
  tileEl.classList.add("used");
  picked.push({ch, tileEl});
  refreshSlots();
  say(ch, 0.9);
  if(picked.length === it.parts.length){
    busy = true;
    setTimeout(check, 500);
  }
}
function unpick(slotIdx){
  if(busy) return;
  const p = picked[slotIdx];
  if(!p) return;
  p.tileEl.classList.remove("used");
  picked.splice(slotIdx,1);
  refreshSlots();
}
function refreshSlots(){
  document.querySelectorAll(".slot").forEach((s,k)=>{
    const p = picked[k];
    s.textContent = p ? p.ch : "";
    s.classList.toggle("filled", !!p);
  });
}

function check(){
  const it = currentItem();
  const got = picked.map(p=>p.ch);
  let ok;
  if(it.ordered){
    ok = got.join("") === it.parts.join("");
    if(!ok && got.slice().sort().join("") === it.parts.slice().sort().join("")){
      // right pieces, wrong order — auto-fix gently
      ok = true;
    }
  }else{
    ok = got.slice().sort().join("") === it.parts.slice().sort().join("");
  }
  ok ? win() : lose();
}

function lose(){
  fails++;
  const jar = $("jar");
  jar.classList.add("wrong");
  say("再試多次啦");
  setTimeout(()=>{
    jar.classList.remove("wrong");
    picked.forEach(p=>p.tileEl.classList.remove("used"));
    picked = []; refreshSlots(); busy = false;
    if(fails >= 2){ // hint: glow the correct tiles
      const need = currentItem().parts.slice();
      document.querySelectorAll(".tile").forEach(t=>{
        const i = need.indexOf(t.textContent);
        if(i>-1){ t.classList.add("hint"); need.splice(i,1); }
      });
    }
  }, 500);
}

function win(){
  const it = currentItem();
  const jar = $("jar");
  jar.classList.add("shake");
  setTimeout(()=>{
    jar.classList.remove("shake");
    $("slots").style.display = "none";
    $("rChar").textContent = it.char;
    $("rEmoji").textContent = it.emoji + " " + it.emoji + " " + it.emoji;
    $("result").classList.add("on");
    burst(14);
    say(`${it.char}！${it.word}！好叻呀！`);
    setTimeout(()=>{
      itemIdx++;
      if(itemIdx >= order.length) finishLevel();
      else renderRound();
    }, 2600);
  }, 1100);
}

function finishLevel(){
  const s = Math.max(stars[lvIdx], 3);
  stars[lvIdx] = s;
  $("celeStars").textContent = "⭐⭐⭐";
  $("cele").classList.add("on");
  burst(30);
  say("嘩！全部啱晒！你係組字大師！");
}
$("celeBtn").onclick = ()=>{
  $("cele").classList.remove("on");
  renderMenu(); show("menu");
};

/* ================= confetti ================= */
const EMO = ["⭐","🎉","✨","🧡","💚","💙","🎈"];
function burst(n){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  for(let i=0;i<n;i++){
    const c = document.createElement("div");
    c.className = "confetti";
    c.textContent = EMO[Math.floor(Math.random()*EMO.length)];
    c.style.left = Math.random()*100 + "vw";
    c.style.animationDuration = (1.6 + Math.random()*1.6) + "s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 3500);
  }
}

/* ================= wiring ================= */
$("homeBtn").onclick = ()=>{ speechSynthesis.cancel(); renderMenu(); show("menu"); };
$("speakBtn").onclick = ()=>{
  const it = currentItem();
  if(it) say(`砌出，${it.word}，嘅${it.char.length>1?"詞語":"字"}，${it.char}`);
};

renderMenu();
</script>
</body>
</html>
