<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Howie's Word Builder</title>
<style>
  :root{
    --sky:#FDF2E3; --sky2:#FAE3C8;
    --ink:#5A3E1B;
    --coral:#FF6F61; --sun:#FFC94D; --leaf:#3FBF9A; --berry:#8E7CE8; --ocean:#3E9FD8;
    --tile:#FFFFFF; --tile-edge:#E4C79A;
    --slot:#FBF7EF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Comic Sans MS','Chalkboard SE','Marker Felt','Segoe UI',sans-serif;
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky2) 100%);
    min-height:100vh; color:var(--ink);
    display:flex; flex-direction:column; align-items:center;
    user-select:none;
  }
  .wrap{width:100%; max-width:560px; padding:16px; display:flex; flex-direction:column; align-items:center;}

  .topbar{width:100%; display:flex; justify-content:space-between; align-items:center; min-height:44px;}
  .home-btn{
    border:none; background:#fff; color:var(--ink); font-family:inherit;
    font-size:16px; font-weight:bold; padding:8px 14px; border-radius:14px;
    border-bottom:4px solid var(--tile-edge); cursor:pointer;
  }
  .stars-row{font-size:22px; letter-spacing:2px; min-height:28px;}

  /* ---------- menu ---------- */
  .title{font-size:32px; margin:14px 0 2px; text-align:center;}
  .subtitle{font-size:15px; margin:0 0 16px; text-align:center; opacity:.8;}
  .level-btn{
    width:100%; max-width:430px; margin:7px 0; padding:14px 18px;
    border:none; border-radius:20px; cursor:pointer;
    font-family:inherit; font-size:19px; font-weight:bold; color:#fff;
    display:flex; align-items:center; gap:13px; text-align:left;
    border-bottom:6px solid rgba(0,0,0,.18);
    transition:transform .1s;
  }
  .level-btn:active{transform:scale(.97);}
  .level-btn .big{font-size:30px;}
  .level-btn small{display:block; font-size:13px; font-weight:normal; opacity:.92;}
  .lv1{background:var(--leaf);}
  .lv2{background:var(--sun); color:#5d4300; border-bottom-color:rgba(0,0,0,.12);}
  .lv3{background:var(--berry);}
  .lv4{background:var(--ocean);}
  .lv5{background:#F2789F;}

  /* ---------- game ---------- */
  .progress{width:100%; max-width:420px; height:14px; background:#fff; border-radius:10px; margin:14px 0 6px; overflow:hidden; border:2px solid var(--tile-edge);}
  .progress .fill{height:100%; width:0%; background:var(--leaf); border-radius:10px; transition:width .4s;}

  .prompt{font-size:17px; margin:10px 0 6px; text-align:center;}

  .pic-frame{
    width:120px; height:120px; background:#fff; border:3px solid var(--tile-edge); border-bottom-width:8px;
    border-radius:26px; display:flex; align-items:center; justify-content:center;
    font-size:64px; margin:4px auto 2px; position:relative;
  }
  .pic-frame.cam{width:230px;}
  .pic-frame.flash{animation:flash .5s;}
  @keyframes flash{0%{background:#fff}30%{background:var(--sun)}100%{background:#fff}}
  .cam-word{font-size:44px; font-weight:bold; color:#9C36B5;}

  /* sound colours: vowels red, consonants blue, special units green, camera words purple */
  .snd-v{color:#E03131 !important;}
  .snd-c{color:#1971C2 !important;}
  .snd-g{color:#2F9E44 !important;}
  .snd-p{color:#9C36B5 !important;}

  .say-btn{
    margin:10px 0 2px; border:none; cursor:pointer; font-family:inherit;
    background:var(--coral); color:#fff; font-size:17px; font-weight:bold;
    padding:10px 20px; border-radius:16px; border-bottom:5px solid #C94F44;
  }
  .say-btn:active{transform:scale(.96);}

  .slots{display:flex; gap:8px; justify-content:center; margin:14px 0 6px; flex-wrap:wrap;}
  .slot{
    min-width:60px; height:70px; padding:0 8px;
    background:var(--slot); border:3px dashed var(--tile-edge); border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:36px; font-weight:bold; cursor:pointer;
    transition:background .15s, border-color .15s, transform .15s;
  }
  .slot.filled{border-style:solid; background:#fff;}
  .slot.good{background:#DFF7EC; border-color:var(--leaf); animation:bounce .5s;}
  .slot.bad{background:#FFE3E0; border-color:var(--coral); animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  @keyframes bounce{0%{transform:scale(1)}40%{transform:scale(1.16)}100%{transform:scale(1)}}

  .bank{display:flex; gap:10px; justify-content:center; margin:16px 0 6px; flex-wrap:wrap; max-width:460px;}
  .btile{
    min-width:62px; height:66px; padding:0 12px;
    background:var(--tile); border:3px solid var(--tile-edge); border-bottom-width:7px;
    border-radius:16px; font-family:inherit; font-size:32px; font-weight:bold; color:var(--ink);
    cursor:pointer; transition:transform .12s, opacity .2s;
  }
  .btile:active{transform:scale(.93);}
  .btile.used{opacity:0; pointer-events:none;}

  .feedback{min-height:34px; font-size:23px; font-weight:bold; text-align:center; margin-top:4px;}

  /* ---------- end screen ---------- */
  .end-emoji{font-size:74px; margin:26px 0 6px; text-align:center;}
  .end-title{font-size:29px; text-align:center; margin:4px 0;}
  .end-stars{font-size:32px; text-align:center; margin:10px 0 22px; letter-spacing:4px;}
  .end-btn{
    display:block; width:100%; max-width:340px; margin:10px auto; padding:15px;
    border:none; border-radius:20px; font-family:inherit; font-size:20px; font-weight:bold;
    cursor:pointer; color:#fff; background:var(--leaf); border-bottom:6px solid rgba(0,0,0,.18);
  }
  .end-btn.alt{background:#fff; color:var(--ink); border-bottom-color:var(--tile-edge);}

  .burst{position:fixed; font-size:28px; pointer-events:none; animation:fly 1s ease-out forwards; z-index:50;}
  @keyframes fly{to{transform:translate(var(--dx),var(--dy)) rotate(360deg); opacity:0;}}

  .hidden{display:none !important;}
  @media (prefers-reduced-motion: reduce){
    .slot,.btile,.burst,.pic-frame{animation:none !important; transition:none !important;}
  }
  @media (max-width:400px){
    .slot{min-width:52px; height:62px; font-size:30px;}
    .btile{min-width:54px; height:58px; font-size:27px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <button class="home-btn hidden" id="homeBtn">🏠 Home</button>
    <div class="stars-row" id="starsRow"></div>
  </div>

  <!-- MENU -->
  <div id="menu">
    <h1 class="title">🧱 Word Builder</h1>
    <p class="subtitle">Look, listen, and build the word from its sounds!</p>
    <button class="level-btn lv1" data-level="0"><span class="big">🐱</span><span>Level 1 · Short words<small>build cat · dog · sun</small></span></button>
    <button class="level-btn lv2" data-level="1"><span class="big">🦆</span><span>Level 2 · Words with “ck”<small>build duck · sock · rock</small></span></button>
    <button class="level-btn lv3" data-level="2"><span class="big">🐸</span><span>Level 3 · Two sounds together<small>build frog · black · snack</small></span></button>
    <button class="level-btn lv4" data-level="3"><span class="big">🚢</span><span>Level 4 · Special sounds<small>build ship · ring · shell</small></span></button>
    <button class="level-btn lv5" data-level="4"><span class="big">📸</span><span>Level 5 · Camera words<small>flash, then build from memory!</small></span></button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="progress"><div class="fill" id="fill"></div></div>
    <p class="prompt" id="prompt"></p>

    <div class="pic-frame" id="picFrame"><span id="picContent">🐱</span></div>
    <button class="say-btn" id="sayBtn">🔊 Say it</button>

    <div class="slots" id="slots"></div>
    <div class="bank" id="bank"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- END -->
  <div id="end" class="hidden" style="width:100%;">
    <div class="end-emoji" id="endEmoji">🎉</div>
    <h2 class="end-title" id="endTitle">Great building!</h2>
    <div class="end-stars" id="endStars"></div>
    <button class="end-btn" id="againBtn">Play again</button>
    <button class="end-btn alt" id="menuBtn">Choose a level</button>
  </div>

</div>

<script>
const LEVELS = [
  { name:"Short words", type:"build", words:[
    {w:"cat", c:["c","a","t"], e:"🐱"}, {w:"dog", c:["d","o","g"], e:"🐶"},
    {w:"sun", c:["s","u","n"], e:"☀️"}, {w:"hat", c:["h","a","t"], e:"🎩"},
    {w:"pig", c:["p","i","g"], e:"🐷"}, {w:"bed", c:["b","e","d"], e:"🛏️"},
    {w:"map", c:["m","a","p"], e:"🗺️"}, {w:"pin", c:["p","i","n"], e:"📌"},
    {w:"bus", c:["b","u","s"], e:"🚌"}, {w:"fox", c:["f","o","x"], e:"🦊"}
  ]},
  { name:"Words with ck", type:"build", words:[
    {w:"duck", c:["d","u","ck"], e:"🦆"}, {w:"sock", c:["s","o","ck"], e:"🧦"},
    {w:"rock", c:["r","o","ck"], e:"🪨"}, {w:"lock", c:["l","o","ck"], e:"🔒"},
    {w:"kick", c:["k","i","ck"], e:"🦵"}, {w:"sick", c:["s","i","ck"], e:"🤒"},
    {w:"pack", c:["p","a","ck"], e:"🎒"}, {w:"tick", c:["t","i","ck"], e:"✅"}
  ]},
  { name:"Two sounds together", type:"build", words:[
    {w:"frog", c:["f","r","o","g"], e:"🐸"}, {w:"black", c:["b","l","a","ck"], e:"⚫"},
    {w:"snack", c:["s","n","a","ck"], e:"🍪"}, {w:"crab", c:["c","r","a","b"], e:"🦀"},
    {w:"swim", c:["s","w","i","m"], e:"🏊"}, {w:"stop", c:["s","t","o","p"], e:"🛑"},
    {w:"drum", c:["d","r","u","m"], e:"🥁"}, {w:"flag", c:["f","l","a","g"], e:"🚩"},
    {w:"clap", c:["c","l","a","p"], e:"👏"}, {w:"spin", c:["s","p","i","n"], e:"🌀"}
  ]},
  { name:"Special sounds", type:"build", words:[
    {w:"chick", c:["ch","i","ck"], e:"🐤"}, {w:"ship", c:["sh","i","p"], e:"🚢"},
    {w:"fish", c:["f","i","sh"], e:"🐟"}, {w:"shop", c:["sh","o","p"], e:"🏪"},
    {w:"bath", c:["b","a","th"], e:"🛁"}, {w:"think", c:["th","i","n","k"], e:"🤔"},
    {w:"quack", c:["qu","a","ck"], e:"🦆"}, {w:"quick", c:["qu","i","ck"], e:"🏃"},
    {w:"ring", c:["r","i","ng"], e:"💍"}, {w:"king", c:["k","i","ng"], e:"🤴"},
    {w:"sing", c:["s","i","ng"], e:"🎤"}, {w:"bell", c:["b","ell"], e:"🔔"},
    {w:"shell", c:["sh","ell"], e:"🐚"}, {w:"smell", c:["s","m","ell"], e:"👃"}
  ]},
  { name:"Camera words", type:"camera", words:[
    {w:"here"}, {w:"come"}, {w:"the"}, {w:"be"}, {w:"all"}, {w:"he"},
    {w:"she"}, {w:"they"}, {w:"like"}, {w:"go"}, {w:"to"}, {w:"hello"}
  ]}
];

/* sounds that are easy to mix up — used as sneaky distractor tiles */
const CONFUSE = {
  b:["d","p"], d:["b","p"], p:["b","q"], q:["p","g"], g:["q","j"],
  a:["o","u"], o:["a","u"], u:["a","o"], i:["e","l"], e:["i","a"],
  m:["n","w"], n:["m","u"], t:["f","l"], f:["t","v"], s:["z","c"],
  c:["k","s"], k:["c","x"], h:["n","b"], r:["n","v"], l:["i","t"],
  w:["m","v"], x:["k","z"], y:["v","j"], j:["g","y"], v:["w","f"],
  ch:["sh","th"], sh:["ch","th"], th:["sh","f"], ck:["k","c"],
  ng:["n","nk"], ll:["l","el"], ell:["ll","all"], qu:["q","cu"]
};

const GREEN_UNITS = new Set(["ck","ch","sh","th","qu","ng","ll","ell","all","nk","el","cu"]);
function sndClass(t){
  if(isCamera()) return "snd-p";
  if(t.length>1 || GREEN_UNITS.has(t)) return "snd-g";
  return "aeiou".includes(t) ? "snd-v" : "snd-c";
}

const ROUND_LEN = 8;
const CHEERS = ["You built it! 🧱⭐","Well done! 🌟","Super spelling! 🎉","Amazing! ⭐","Word builder! 🏗️"];
const FLASH_MS = 2600;

let level=0, queue=[], qIndex=0, stars=0, locked=false, firstTry=true;
let slots=[], bank=[], camTimer=null;

const $ = id => document.getElementById(id);
const shuffle = a => a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);
const isCamera = () => LEVELS[level].type === "camera";

function show(screen){
  ["menu","game","end"].forEach(s=>$(s).classList.toggle("hidden", s!==screen));
  $("homeBtn").classList.toggle("hidden", screen==="menu");
}

function speak(text){
  try{
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.8; u.pitch=1.1;
    speechSynthesis.speak(u);
  }catch(e){}
}

function startLevel(lv){
  level=lv; stars=0; qIndex=0;
  queue = shuffle(LEVELS[lv].words.slice()).slice(0, ROUND_LEN);
  updateStars();
  $("prompt").textContent = isCamera()
    ? "Take a picture with your eyes 📸 then build it from memory!"
    : "Say the word slowly. Tap the sounds in order! 👇";
  show("game");
  loadQuestion();
}

function updateStars(){ $("starsRow").textContent = "⭐".repeat(stars); }

function chunksFor(q){ return isCamera() ? q.w.split("") : q.c; }

function makeDistractors(chunks, n){
  const pool = [];
  chunks.forEach(ch=>{ (CONFUSE[ch]||[]).forEach(d=>{ if(!chunks.includes(d)) pool.push(d); }); });
  const extra = shuffle([...new Set(pool)]).slice(0,n);
  while(extra.length<n){
    const any = "abdegimnoprstu".split("").filter(x=>!chunks.includes(x)&&!extra.includes(x));
    extra.push(any[Math.floor(Math.random()*any.length)]);
  }
  return extra;
}

function loadQuestion(){
  locked=false; firstTry=true;
  clearTimeout(camTimer);
  $("feedback").textContent="";
  $("fill").style.width = Math.round(qIndex/queue.length*100)+"%";

  const q = queue[qIndex];
  const chunks = chunksFor(q);

  // picture / camera frame
  const frame=$("picFrame"), pc=$("picContent");
  frame.classList.toggle("cam", isCamera());
  if(isCamera()){
    pc.innerHTML = `<span class="cam-word">${q.w}</span>`;
    frame.classList.remove("flash"); void frame.offsetWidth;
    frame.classList.add("flash");
    speak(q.w);
    camTimer=setTimeout(()=>{ pc.innerHTML = `<span class="cam-word">❔</span>`; }, FLASH_MS);
    $("sayBtn").textContent="🔊 Listen again";
  }else{
    pc.textContent=q.e;
    $("sayBtn").textContent="🔊 Say it";
    setTimeout(()=>speak(q.w), 350);
  }

  // slots
  slots = chunks.map(()=>null);
  const sBox=$("slots"); sBox.innerHTML="";
  chunks.forEach((_,i)=>{
    const d=document.createElement("div");
    d.className="slot"; d.dataset.i=i;
    d.onclick=()=>removeFromSlot(i);
    sBox.appendChild(d);
  });

  // bank: correct chunks + distractors
  const nDis = Math.min(3, 2 + (chunks.length>3?1:0));
  const tiles = shuffle([...chunks, ...makeDistractors(chunks,nDis)]);
  bank = tiles.map((t,i)=>({id:i, text:t, used:false}));
  const bBox=$("bank"); bBox.innerHTML="";
  bank.forEach(t=>{
    const b=document.createElement("button");
    b.className="btile "+sndClass(t.text); b.textContent=t.text; b.dataset.id=t.id;
    b.onclick=()=>placeTile(t.id);
    bBox.appendChild(b);
  });
}

function placeTile(id){
  if(locked) return;
  const t=bank.find(x=>x.id===id);
  if(!t||t.used) return;
  const i=slots.indexOf(null);
  if(i===-1) return;
  slots[i]=t; t.used=true;
  render();
  if(!slots.includes(null)) setTimeout(check, 250);
}

function removeFromSlot(i){
  if(locked||!slots[i]) return;
  slots[i].used=false; slots[i]=null;
  render();
}

function render(){
  [...$("slots").children].forEach((el,i)=>{
    el.textContent = slots[i]?slots[i].text:"";
    el.className = "slot" + (slots[i] ? " filled "+sndClass(slots[i].text) : "");
  });
  [...$("bank").children].forEach(el=>{
    const t=bank.find(x=>x.id==el.dataset.id);
    el.classList.toggle("used", t.used);
  });
}

function check(){
  const q=queue[qIndex], chunks=chunksFor(q);
  const els=[...$("slots").children];
  let allGood=true;
  slots.forEach((t,i)=>{
    const good = t.text===chunks[i];
    els[i].classList.add(good?"good":"bad");
    if(!good) allGood=false;
  });

  if(allGood){
    locked=true;
    clearTimeout(camTimer);
    if(isCamera()) $("picContent").innerHTML=`<span class="cam-word">${q.w}</span>`;
    if(firstTry){ stars++; updateStars(); }
    $("feedback").textContent = CHEERS[Math.floor(Math.random()*CHEERS.length)];
    burst($("slots"));
    speak(q.w+"!");
    setTimeout(()=>{
      qIndex++;
      qIndex<queue.length ? loadQuestion() : endRound();
    }, 1500);
  }else{
    firstTry=false;
    $("feedback").textContent = "Listen again! 👂";
    speak(q.w);
    setTimeout(()=>{
      // send back only the wrong tiles
      slots.forEach((t,i)=>{
        if(t && t.text!==chunksFor(q)[i]){ t.used=false; slots[i]=null; }
      });
      render();
    }, 900);
  }
}

function burst(el){
  const r=el.getBoundingClientRect();
  const cx=r.left+r.width/2, cy=r.top+r.height/2;
  for(let i=0;i<8;i++){
    const s=document.createElement("div");
    s.className="burst"; s.textContent=i%2?"⭐":"✨";
    s.style.left=cx+"px"; s.style.top=cy+"px";
    s.style.setProperty("--dx",(Math.random()*220-110)+"px");
    s.style.setProperty("--dy",(Math.random()*-180-40)+"px");
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

function endRound(){
  clearTimeout(camTimer);
  $("fill").style.width="100%";
  const total=queue.length;
  $("endStars").textContent="⭐".repeat(stars)+"☆".repeat(total-stars);
  if(stars===total){ $("endEmoji").textContent="🏆"; $("endTitle").textContent="Perfect! Every word built!"; }
  else if(stars>=total-2){ $("endEmoji").textContent="🎉"; $("endTitle").textContent="Great building!"; }
  else { $("endEmoji").textContent="🌱"; $("endTitle").textContent="Good practice! Build again?"; }
  show("end");
}

document.querySelectorAll(".level-btn").forEach(b=>{ b.onclick=()=>startLevel(+b.dataset.level); });
$("sayBtn").onclick=()=>{
  const q=queue[qIndex];
  speak(q.w);
};
$("homeBtn").onclick=()=>{ clearTimeout(camTimer); $("starsRow").textContent=""; show("menu"); };
$("againBtn").onclick=()=>startLevel(level);
$("menuBtn").onclick=()=>{ $("starsRow").textContent=""; show("menu"); };
</script>
</body>
</html>
