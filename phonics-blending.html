<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Howie's Word Blender</title>
<style>
  :root{
    --sky:#DFF3FB; --sky2:#C9EAF8;
    --ink:#234B7A;
    --coral:#FF6F61; --sun:#FFC94D; --leaf:#3FBF9A; --berry:#8E7CE8;
    --tile:#FFFFFF; --tile-edge:#B9DDEF;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Comic Sans MS','Chalkboard SE','Marker Felt','Segoe UI',sans-serif;
    background:linear-gradient(180deg,var(--sky) 0%,var(--sky2) 100%);
    min-height:100vh; color:var(--ink);
    display:flex; flex-direction:column; align-items:center;
    user-select:none;
  }
  .wrap{width:100%; max-width:560px; padding:16px; display:flex; flex-direction:column; align-items:center;}

  /* ---------- header ---------- */
  .topbar{width:100%; display:flex; justify-content:space-between; align-items:center; min-height:44px;}
  .home-btn{
    border:none; background:#fff; color:var(--ink); font-family:inherit;
    font-size:16px; font-weight:bold; padding:8px 14px; border-radius:14px;
    border-bottom:4px solid var(--tile-edge); cursor:pointer;
  }
  .stars-row{font-size:22px; letter-spacing:2px; min-height:28px;}

  /* ---------- menu ---------- */
  .title{font-size:34px; margin:18px 0 2px; text-align:center;}
  .subtitle{font-size:16px; margin:0 0 22px; text-align:center; opacity:.8;}
  .level-btn{
    width:100%; max-width:420px; margin:10px 0; padding:18px 20px;
    border:none; border-radius:22px; cursor:pointer;
    font-family:inherit; font-size:22px; font-weight:bold; color:#fff;
    display:flex; align-items:center; gap:14px; text-align:left;
    border-bottom:6px solid rgba(0,0,0,.18);
    transition:transform .1s;
  }
  .level-btn:active{transform:scale(.97);}
  .level-btn .big{font-size:34px;}
  .level-btn small{display:block; font-size:14px; font-weight:normal; opacity:.9;}
  .lv1{background:var(--leaf);} .lv2{background:var(--sun); color:#5d4300;}
  .lv2{border-bottom-color:rgba(0,0,0,.12);}
  .lv3{background:var(--berry);}

  /* ---------- game ---------- */
  .progress{width:100%; max-width:420px; height:14px; background:#fff; border-radius:10px; margin:14px 0 6px; overflow:hidden; border:2px solid var(--tile-edge);}
  .progress .fill{height:100%; width:0%; background:var(--leaf); border-radius:10px; transition:width .4s;}

  .prompt{font-size:18px; margin:14px 0 8px; text-align:center;}

  .word-row{display:flex; gap:8px; justify-content:center; margin:6px 0 4px; flex-wrap:wrap;}
  .chunk{
    background:var(--tile); border:3px solid var(--tile-edge); border-bottom-width:7px;
    border-radius:16px; min-width:64px; padding:10px 14px;
    font-size:46px; font-weight:bold; text-align:center; color:var(--ink);
    transition:transform .15s, background .15s, border-color .15s, color .15s;
  }
  .chunk.pop{transform:translateY(-14px) scale(1.12); background:var(--sun); border-color:#E5A93A; color:#5d4300;}
  .chunk.together{transform:scale(1.06); background:#E7F8F1; border-color:var(--leaf);}

  .sound-btn{
    margin:14px 0 6px; border:none; cursor:pointer; font-family:inherit;
    background:var(--coral); color:#fff; font-size:19px; font-weight:bold;
    padding:12px 22px; border-radius:18px; border-bottom:5px solid #C94F44;
  }
  .sound-btn:active{transform:scale(.96);}

  .choices{display:flex; gap:14px; justify-content:center; margin:18px 0 8px; flex-wrap:wrap;}
  .choice{
    background:#fff; border:3px solid var(--tile-edge); border-bottom-width:8px;
    border-radius:24px; width:110px; height:110px; font-size:58px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:transform .12s, border-color .2s, background .2s;
  }
  .choice:active{transform:scale(.94);}
  .choice.right{background:#DFF7EC; border-color:var(--leaf); animation:bounce .5s;}
  .choice.wrong{animation:shake .4s; border-color:var(--coral); opacity:.45;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  @keyframes bounce{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}

  .feedback{min-height:34px; font-size:24px; font-weight:bold; text-align:center; margin-top:6px;}

  /* ---------- end screen ---------- */
  .end-emoji{font-size:74px; margin:26px 0 6px; text-align:center;}
  .end-title{font-size:30px; text-align:center; margin:4px 0;}
  .end-stars{font-size:34px; text-align:center; margin:10px 0 22px; letter-spacing:4px;}
  .end-btn{
    display:block; width:100%; max-width:340px; margin:10px auto; padding:15px;
    border:none; border-radius:20px; font-family:inherit; font-size:20px; font-weight:bold;
    cursor:pointer; color:#fff; background:var(--leaf); border-bottom:6px solid rgba(0,0,0,.18);
  }
  .end-btn.alt{background:#fff; color:var(--ink); border-bottom-color:var(--tile-edge);}

  .burst{position:fixed; font-size:28px; pointer-events:none; animation:fly 1s ease-out forwards; z-index:50;}
  @keyframes fly{to{transform:translate(var(--dx),var(--dy)) rotate(360deg); opacity:0;}}

  .hidden{display:none !important;}
  @media (prefers-reduced-motion: reduce){
    .chunk,.choice,.burst{animation:none !important; transition:none !important;}
  }
  @media (max-width:400px){
    .chunk{font-size:38px; min-width:54px;}
    .choice{width:94px; height:94px; font-size:50px;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <button class="home-btn hidden" id="homeBtn">🏠 Home</button>
    <div class="stars-row" id="starsRow"></div>
  </div>

  <!-- MENU -->
  <div id="menu">
    <h1 class="title">🎈 Word Blender</h1>
    <p class="subtitle">Sound it out, read the word, tap the picture!</p>
    <button class="level-btn lv1" data-level="0"><span class="big">🐱</span><span>Level 1 · Short words<small>cat · dog · sun</small></span></button>
    <button class="level-btn lv2" data-level="1"><span class="big">🦆</span><span>Level 2 · Words with “ck”<small>duck · sock · rock</small></span></button>
    <button class="level-btn lv3" data-level="2"><span class="big">🐸</span><span>Level 3 · Two sounds together<small>frog · black · snack</small></span></button>
  </div>

  <!-- GAME -->
  <div id="game" class="hidden" style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <div class="progress"><div class="fill" id="fill"></div></div>
    <p class="prompt">Read the word, then tap the matching picture 👇</p>
    <div class="word-row" id="wordRow"></div>
    <button class="sound-btn" id="soundBtn">🔊 Sound it out</button>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <!-- END -->
  <div id="end" class="hidden" style="width:100%;">
    <div class="end-emoji" id="endEmoji">🎉</div>
    <h2 class="end-title" id="endTitle">Great reading!</h2>
    <div class="end-stars" id="endStars"></div>
    <button class="end-btn" id="againBtn">Play again</button>
    <button class="end-btn alt" id="menuBtn">Choose a level</button>
  </div>

</div>

<script>
const LEVELS = [
  { name:"Short words", words:[
    {w:"cat", c:["c","a","t"], e:"🐱"}, {w:"dog", c:["d","o","g"], e:"🐶"},
    {w:"sun", c:["s","u","n"], e:"☀️"}, {w:"hat", c:["h","a","t"], e:"🎩"},
    {w:"pig", c:["p","i","g"], e:"🐷"}, {w:"bed", c:["b","e","d"], e:"🛏️"},
    {w:"map", c:["m","a","p"], e:"🗺️"}, {w:"pin", c:["p","i","n"], e:"📌"},
    {w:"bus", c:["b","u","s"], e:"🚌"}, {w:"fox", c:["f","o","x"], e:"🦊"}
  ]},
  { name:"Words with ck", words:[
    {w:"duck", c:["d","u","ck"], e:"🦆"}, {w:"sock", c:["s","o","ck"], e:"🧦"},
    {w:"rock", c:["r","o","ck"], e:"🪨"}, {w:"lock", c:["l","o","ck"], e:"🔒"},
    {w:"kick", c:["k","i","ck"], e:"🦵"}, {w:"sick", c:["s","i","ck"], e:"🤒"},
    {w:"pack", c:["p","a","ck"], e:"🎒"}, {w:"tick", c:["t","i","ck"], e:"✅"}
  ]},
  { name:"Two sounds together", words:[
    {w:"frog", c:["f","r","o","g"], e:"🐸"}, {w:"black", c:["b","l","a","ck"], e:"⚫"},
    {w:"snack", c:["s","n","a","ck"], e:"🍪"}, {w:"crab", c:["c","r","a","b"], e:"🦀"},
    {w:"swim", c:["s","w","i","m"], e:"🏊"}, {w:"stop", c:["s","t","o","p"], e:"🛑"},
    {w:"drum", c:["d","r","u","m"], e:"🥁"}, {w:"flag", c:["f","l","a","g"], e:"🚩"},
    {w:"clap", c:["c","l","a","p"], e:"👏"}, {w:"spin", c:["s","p","i","n"], e:"🌀"}
  ]}
];
const ROUND_LEN = 8;
const CHEERS = ["Great job! ⭐","Well done! 🌟","You read it! 🎉","Super! ⭐","Amazing! 🌟"];

let level=0, queue=[], qIndex=0, stars=0, locked=false, firstTry=true, animTimer=[];

const $ = id => document.getElementById(id);
const shuffle = a => a.map(v=>[Math.random(),v]).sort((x,y)=>x[0]-y[0]).map(v=>v[1]);

function show(screen){
  ["menu","game","end"].forEach(s=>$(s).classList.toggle("hidden", s!==screen));
  $("homeBtn").classList.toggle("hidden", screen==="menu");
}

function speak(text){
  try{
    if(!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang="en-US"; u.rate=0.85; u.pitch=1.1;
    speechSynthesis.speak(u);
  }catch(e){}
}

function startLevel(lv){
  level=lv; stars=0; qIndex=0; 
  queue = shuffle(LEVELS[lv].words.slice()).slice(0, ROUND_LEN);
  updateStars();
  show("game");
  loadQuestion();
}

function updateStars(){
  $("starsRow").textContent = "⭐".repeat(stars);
}

function loadQuestion(){
  locked=false; firstTry=true;
  $("feedback").textContent="";
  $("fill").style.width = Math.round(qIndex/queue.length*100)+"%";

  const q = queue[qIndex];

  // word tiles
  const row = $("wordRow"); row.innerHTML="";
  q.c.forEach(ch=>{
    const d=document.createElement("div");
    d.className="chunk"; d.textContent=ch;
    row.appendChild(d);
  });

  // choices: correct + 2 distractors from same level
  const others = shuffle(LEVELS[level].words.filter(w=>w.w!==q.w)).slice(0,2);
  const opts = shuffle([q, ...others]);
  const box = $("choices"); box.innerHTML="";
  opts.forEach(o=>{
    const b=document.createElement("button");
    b.className="choice"; b.textContent=o.e;
    b.setAttribute("aria-label", o.w);
    b.onclick=()=>pick(b, o.w===q.w, q);
    box.appendChild(b);
  });

  setTimeout(()=>soundOut(q), 350);
}

function soundOut(q){
  animTimer.forEach(clearTimeout); animTimer=[];
  const tiles=[...$("wordRow").children];
  tiles.forEach(t=>t.classList.remove("pop","together"));
  tiles.forEach((t,i)=>{
    animTimer.push(setTimeout(()=>{ t.classList.add("pop"); },        i*450));
    animTimer.push(setTimeout(()=>{ t.classList.remove("pop"); },     i*450+380));
  });
  const total = tiles.length*450+150;
  animTimer.push(setTimeout(()=>{ tiles.forEach(t=>t.classList.add("together")); }, total));
  animTimer.push(setTimeout(()=>{ tiles.forEach(t=>t.classList.remove("together")); }, total+700));
}

function pick(btn, correct, q){
  if(locked) return;
  if(correct){
    locked=true;
    btn.classList.add("right");
    if(firstTry){ stars++; updateStars(); }
    $("feedback").textContent = CHEERS[Math.floor(Math.random()*CHEERS.length)];
    burst(btn);
    speak(q.w);
    setTimeout(()=>{
      qIndex++;
      qIndex < queue.length ? loadQuestion() : endRound();
    }, 1400);
  }else{
    firstTry=false;
    btn.classList.add("wrong");
    btn.disabled=true;
    $("feedback").textContent = "Try again! 💪";
  }
}

function burst(el){
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for(let i=0;i<8;i++){
    const s=document.createElement("div");
    s.className="burst"; s.textContent = i%2 ? "⭐" : "✨";
    s.style.left=cx+"px"; s.style.top=cy+"px";
    s.style.setProperty("--dx",(Math.random()*220-110)+"px");
    s.style.setProperty("--dy",(Math.random()*-180-40)+"px");
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),1000);
  }
}

function endRound(){
  $("fill").style.width="100%";
  const total=queue.length;
  $("endStars").textContent = "⭐".repeat(stars) + "☆".repeat(total-stars);
  if(stars===total){ $("endEmoji").textContent="🏆"; $("endTitle").textContent="Perfect! Every word right!"; }
  else if(stars>=total-2){ $("endEmoji").textContent="🎉"; $("endTitle").textContent="Great reading!"; }
  else { $("endEmoji").textContent="🌱"; $("endTitle").textContent="Good practice! Try again?"; }
  show("end");
}

document.querySelectorAll(".level-btn").forEach(b=>{
  b.onclick=()=>startLevel(+b.dataset.level);
});
$("soundBtn").onclick=()=>soundOut(queue[qIndex]);
$("homeBtn").onclick=()=>{ $("starsRow").textContent=""; show("menu"); };
$("againBtn").onclick=()=>startLevel(level);
$("menuBtn").onclick=()=>{ $("starsRow").textContent=""; show("menu"); };
</script>
</body>
</html>
